<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway - Class A</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f4f8; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .status-box { background: #e3f2fd; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.85em; color: #1976d2; border: 1px solid #bbdefb; text-align: left; }
        .status-box b { color: #0d47a1; }
        input { width: 92%; padding: 15px; margin: 10px 0; border: 2px solid #dfe6e9; border-radius: 12px; font-size: 1.1em; text-align: center; outline: none; }
        #nameDisplay { color: #28a745; font-weight: bold; margin: 5px 0 15px; min-height: 20px; font-size: 0.95em; }
        button { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1em; margin-top: 10px; }
        .error-banner { background: #ffebee; color: #c62828; padding: 15px; border-radius: 12px; margin-top: 20px; display: none; font-weight: bold; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Attendance Gateway</h2>
        
        <div class="status-box">
            <div><b>Session:</b> <span id="viewSession">Detecting...</span></div>
            <div><b>Start Time:</b> <span id="viewTime">Detecting...</span></div>
        </div>

        <p style="color: #666; font-size: 0.9em;">Enter Student ID & Access Code</p>
        
        <input type="number" id="studentID" placeholder="7-Digit Student ID" oninput="lookupStudent()" inputmode="numeric">
        <div id="nameDisplay"></div>
        
        <input type="text" id="userInputCode" placeholder="Access Code (e.g. A721)" maxlength="4" style="text-transform:uppercase;">
        
        <button onclick="submitAttendance()">Submit Attendance</button>
        <div id="errorBanner" class="error-banner"></div>
    </div>

<script>
    // --- 1. IMMEDIATE DATA CAPTURE (SELF-HEALING) ---
    const urlParams = new URLSearchParams(window.location.search);
    
    // Grab sID from URL. If missing, default to ClassA
    const capturedSession = urlParams.get('sID') || "ClassA";
    
    // Grab sTime from URL. If missing, use current clock time
    const capturedStartTime = urlParams.get('sTime') || new Date().toLocaleTimeString('en-GB', { hour12: false });

    // FORCE the screen to update immediately (prevents "Detecting..." hang)
    document.getElementById('viewSession').innerText = capturedSession;
    document.getElementById('viewTime').innerText = capturedStartTime;
    // ------------------------------------------------

    let studentList = [];
    fetch('students.json?v=' + Date.now())
        .then(res => res.json())
        .then(data => { studentList = data; })
        .catch(err => console.log("Database load error"));

    function lookupStudent() {
        const idInput = document.getElementById('studentID').value.trim();
        const display = document.getElementById('nameDisplay');
        if (idInput.length >= 7) {
            const student = studentList.find(s => String(s.id).trim() === idInput);
            if (student) {
                display.innerText = "Verified: " + student.name;
                display.style.color = "#28a745";
            } else {
                display.innerText = "ID " + idInput + " not in list. Proceed anyway.";
                display.style.color = "#ffa500";
            }
        } else { display.innerText = ""; }
    }

    const CONFIG = {
        formID: "1FAIpQLSfS-26mbU2wUVmN6WRNIU9ygJghJe4ZhPqOPLTiiU1HkHfqYg",
        entryID: "1789568109", entrySession: "952022947", entryStart: "1333691548", entryCode: "1629490056",
        validCodes: ["A721", "B902", "C343", "D554", "E125", "F886", "G097", "H338", "I419", "J660", "K111", "L222", "M333", "N444", "P555"]
    };

    function submitAttendance() {
        const id = document.getElementById('studentID').value.trim();
        const code = document.getElementById('userInputCode').value.toUpperCase();
        const banner = document.getElementById('errorBanner');
        const now = Date.now();

        const lastSub = localStorage.getItem('lock_A');
        if (lastSub && (now - lastSub < 1800000)) {
            banner.innerText = "This device is locked out until the current session closes.";
            banner.style.display = "block";
            return;
        }

        if (id.length < 7 || !CONFIG.validCodes.includes(code)) {
            alert("Invalid ID or Access Code."); return;
        }

        localStorage.setItem('lock_A', now);
        const params = new URLSearchParams();
        params.append(`entry.${CONFIG.entryID}`, id);
        params.append(`entry.${CONFIG.entrySession}`, capturedSession);
        params.append(`entry.${CONFIG.entryCode}`, code);
        params.append(`entry.${CONFIG.entryStart}`, capturedStartTime);

        window.location.href = `https://docs.google.com/forms/d/e/${CONFIG.formID}/viewform?${params.toString()}`;
    }
</script>
</body>
</html>
