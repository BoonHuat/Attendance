<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Gateway - Class A</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f4f8; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; position: relative; }
        .status-box { background: #e3f2fd; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.85em; color: #1976d2; border: 1px solid #bbdefb; text-align: left; }
        
        /* Search Styling */
        .search-container { position: relative; text-align: left; }
        input { width: 100%; padding: 15px; box-sizing: border-box; border: 2px solid #dfe6e9; border-radius: 12px; font-size: 1.1em; outline: none; margin-bottom: 5px; }
        input:focus { border-color: #007bff; }
        
        #resultsList { 
            position: absolute; width: 100%; background: white; border: 1px solid #ddd; 
            border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; padding: 0; margin: 0; list-style: none;
        }
        #resultsList li { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 0.95em; }
        #resultsList li:hover { background: #f8f9fa; }

        #selectionStatus { margin: 10px 0; font-weight: bold; color: #28a745; min-height: 20px; font-size: 0.9em; }
        
        button { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1em; margin-top: 10px; }
        
        /* Lockout Styling */
        #lockoutScreen { display: none; padding: 40px 20px; }
        .lock-icon { font-size: 50px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="lockoutScreen" class="card">
        <div class="lock-icon">🚫</div>
        <h2 style="color: #c62828;">Already Submitted</h2>
        <p>Attendance for this device has already been recorded.</p>
        <p style="font-size: 0.8em; color: #666;">Only one submission is permitted every 30 minutes.</p>
    </div>

    <div id="mainContent" class="card">
        <h2>Attendance Gateway</h2>
        
        <div class="status-box">
            <div><b>Session:</b> <span id="viewSession">Detecting...</span></div>
            <div><b>Start Time:</b> <span id="viewTime">Detecting...</span></div>
        </div>

        <div class="search-container">
            <p style="color: #666; font-size: 0.85em; margin-bottom: 5px;">Search Student ID or Name</p>
            <input type="text" id="studentSearch" placeholder="Start typing..." oninput="filterStudents()" autocomplete="off">
            <ul id="resultsList"></ul>
        </div>

        <div id="selectionStatus"></div>
        
        <input type="text" id="userInputCode" placeholder="Access Code" maxlength="4" style="text-transform:uppercase; text-align: center;">
        
        <button id="submitBtn" onclick="submitAttendance()">Submit Attendance</button>
    </div>

<script>
    // --- 1. LOCK CHECK (Runs immediately) ---
    function isLocked() {
        const lastSub = localStorage.getItem('lock_A');
        const now = Date.now();
        if (lastSub && (now - lastSub < 1800000)) { 
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('lockoutScreen').style.display = 'block';
            return true;
        }
        return false;
    }

    if (!isLocked()) {
        fetch('students.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => { window.studentList = data; })
            .catch(err => console.log("Database load error"));
    }

    // --- 2. DATA CAPTURE ---
    const urlParams = new URLSearchParams(window.location.search);
    const capturedSession = urlParams.get('sID') || "ClassA";
    const capturedStartTime = urlParams.get('sTime') || new Date().toLocaleTimeString('en-GB', { hour12: false });
    document.getElementById('viewSession').innerText = capturedSession;
    document.getElementById('viewTime').innerText = capturedStartTime;

    let selectedID = "";

    function filterStudents() {
        const query = document.getElementById('studentSearch').value.toLowerCase();
        const list = document.getElementById('resultsList');
        if (query.length < 2) { list.style.display = 'none'; return; }
        
        const matches = window.studentList.filter(s => 
            String(s.id).includes(query) || s.name.toLowerCase().includes(query)
        ).slice(0, 10);

        if (matches.length > 0) {
            list.innerHTML = matches.map(s => `<li onclick="selectStudent('${s.id}', '${s.name}')"><b>${s.id}</b> - ${s.name}</li>`).join('');
            list.style.display = 'block';
        } else { list.style.display = 'none'; }
    }

    function selectStudent(id, name) {
        selectedID = id;
        document.getElementById('studentSearch').value = name;
        document.getElementById('selectionStatus').innerText = "Confirmed: " + name;
        document.getElementById('resultsList').style.display = 'none';
    }

    const CONFIG = {
        formID: "1FAIpQLSfS-26mbU2wUVmN6WRNIU9ygJghJe4ZhPqOPLTiiU1HkHfqYg",
        entryID: "1789568109", entrySession: "952022947", entryStart: "1333691548", entryCode: "1629490056",
        validCodes: ["A721", "B902", "C343", "D554", "E125", "F886", "G097", "H338", "I419", "J660", "K111", "L222", "M333", "N444", "P555"]
    };

    // --- 3. SUBMISSION ---
    function submitAttendance() {
        if (isLocked()) return;

        const code = document.getElementById('userInputCode').value.toUpperCase();
        if (!selectedID) { alert("Select your name first."); return; }
        if (!CONFIG.validCodes.includes(code)) { alert("Invalid Access Code."); return; }

        // LOCK BEFORE REDIRECT
        localStorage.setItem('lock_A', Date.now());
        
        document.getElementById('submitBtn').innerText = "Redirecting...";
        document.getElementById('submitBtn').disabled = true;

        const params = new URLSearchParams();
        params.append(`entry.${CONFIG.entryID}`, selectedID);
        params.append(`entry.${CONFIG.entrySession}`, capturedSession);
        params.append(`entry.${CONFIG.entryCode}`, code);
        params.append(`entry.${CONFIG.entryStart}`, capturedStartTime);

        setTimeout(() => {
            window.location.href = `https://docs.google.com/forms/d/e/${CONFIG.formID}/viewform?${params.toString()}`;
        }, 150);
    }
</script>
</body>
</html>
