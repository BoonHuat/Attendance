<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Gateway - Class C</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f4f8; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        
        /* GOLD THEME FOR CLASS C */
        .status-box { background: #fff8e1; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.85em; color: #ff8f00; border: 1px solid #ffecb3; text-align: left; }
        .status-box b { color: #ff6f00; }
        
        .search-container { position: relative; text-align: left; }
        input { width: 100%; padding: 15px; box-sizing: border-box; border: 2px solid #dfe6e9; border-radius: 12px; font-size: 1.1em; outline: none; margin-bottom: 10px; }
        input:focus { border-color: #ffb300; }
        
        #resultsList { position: absolute; width: 100%; background: white; border: 1px solid #ddd; border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; padding: 0; margin: 0; list-style: none; }
        #resultsList li { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 0.95em; }
        #resultsList li:hover { background: #fff8e1; }

        #selectionStatus { margin: 10px 0; font-weight: bold; color: #28a745; min-height: 20px; font-size: 0.9em; }
        
        /* GOLD BUTTON FOR CLASS C */
        button { background: #ffb300; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1em; margin-top: 10px; }
        .error-banner { background: #ffebee; color: #c62828; padding: 15px; border-radius: 12px; margin-top: 20px; display: none; font-weight: bold; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Attendance Gateway</h2>
        
        <div class="status-box">
            <div><b>Session:</b> <span id="viewSession">Detecting...</span></div>
            <div><b>Start Time:</b> <span id="viewTime">Detecting...</span></div>
        </div>

        <div id="formContent">
            <p style="color: #666; font-size: 0.9em;">Search Student ID or Name</p>
            <div class="search-container">
                <input type="text" id="studentSearch" placeholder="Type ID or Name..." oninput="filterStudents()" autocomplete="off">
                <ul id="resultsList"></ul>
            </div>
            <div id="selectionStatus"></div>
            <input type="text" id="userInputCode" placeholder="Access Code (e.g. A721)" maxlength="4" style="text-transform:uppercase; text-align: center;">
            <button id="submitBtn" onclick="submitAttendance()">Submit Attendance</button>
        </div>

        <div id="errorBanner" class="error-banner"></div>
    </div>

<script>
    // --- STEP 1: IMMEDIATE CAPTURE (THE ANTI-HANG FIX) ---
    const urlParams = new URLSearchParams(window.location.search);
    const capturedSession = urlParams.get('sID') || "ClassC";
    const capturedStartTime = urlParams.get('sTime') || new Date().toLocaleTimeString('en-GB', { hour12: false });

    // Force update the UI instantly
    document.getElementById('viewSession').innerText = capturedSession;
    document.getElementById('viewTime').innerText = capturedStartTime;

    let studentList = [];
    let selectedID = "";

    fetch('students.json?v=' + Date.now())
        .then(res => res.json())
        .then(data => { studentList = data; })
        .catch(err => console.log("List load error"));

    function filterStudents() {
        const query = document.getElementById('studentSearch').value.toLowerCase();
        const list = document.getElementById('resultsList');
        if (query.length < 2) { list.style.display = 'none'; return; }
        const matches = studentList.filter(s => String(s.id).includes(query) || s.name.toLowerCase().includes(query)).slice(0, 10);
        if (matches.length > 0) {
            list.innerHTML = matches.map(s => `<li onclick="selectStudent('${s.id}', '${s.name}')"><b>${s.id}</b> - ${s.name}</li>`).join('');
            list.style.display = 'block';
        } else { list.style.display = 'none'; }
    }

    function selectStudent(id, name) {
        selectedID = id;
        document.getElementById('studentSearch').value = name;
        document.getElementById('selectionStatus').innerText = "Confirmed: " + name;
        document.getElementById('resultsList').style.display = 'none';
    }

    const CONFIG = {
        formID: "1FAIpQLSfS-26mbU2wUVmN6WRNIU9ygJghJe4ZhPqOPLTiiU1HkHfqYg",
        entryID: "1789568109", entrySession: "952022947", entryStart: "1333691548", entryCode: "1629490056",
        validCodes: ["A721", "B902", "C343", "D554", "E125", "F886", "G097", "H338", "I419", "J660", "K111", "L222", "M333", "N444", "P555"]
    };

    function submitAttendance() {
        const code = document.getElementById('userInputCode').value.toUpperCase();
        const banner = document.getElementById('errorBanner');
        const now = Date.now();

        // --- UPDATED TO LOCK_C FOR CLASS C ---
        const lastSub = localStorage.getItem('lock_C');
        if (lastSub && (now - lastSub < 1800000)) {
            banner.innerText = "This device is locked out. Only one submission permitted per student.";
            banner.style.display = "block";
            document.getElementById('formContent').style.display = "none";
            return;
        }

        if (!selectedID || !CONFIG.validCodes.includes(code)) {
            alert("Please select your name and enter a valid Access Code."); 
            return;
        }

        localStorage.setItem('lock_C', now);
        const params = new URLSearchParams();
        params.append(`entry.${CONFIG.entryID}`, selectedID);
        params.append(`entry.${CONFIG.entrySession}`, capturedSession);
        params.append(`entry.${CONFIG.entryCode}`, code);
        params.append(`entry.${CONFIG.entryStart}`, capturedStartTime);

        window.location.href = `https://docs.google.com/forms/d/e/${CONFIG.formID}/viewform?${params.toString()}`;
    }
</script>
</body>
</html>
